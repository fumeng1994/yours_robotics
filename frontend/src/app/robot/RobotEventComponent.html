<div class="dashboard-container">
    <div class="header-row">
        <h2>Autonomous Operations Timeline: {{ robotId }}</h2>

        <div class="zoom-controls">
            <button class="btn-zoom" [class.active]="activeView === 'full'" (click)="zoomToFull()">
                Full 14-Day View
            </button>

            <div class="day-scroll">
                <button *ngFor="let day of availableDays" class="btn-day" [class.active]="activeView === day"
                    (click)="zoomToDay(day)">
                    {{ day | date:'MMM d' }}
                </button>
            </div>
        </div>
    </div>

    @if (errorMessage) {
    <div class="error-banner">{{ errorMessage }}</div>
    }

    @if (interactionConfig$ | async; as intConfig) {
    <div class="track-box">
        <div class="track-header interaction-header">
            <span class="star-indicator">★</span> Interaction Events
        </div>
        <div class="canvas-container">
            <canvas baseChart [data]="intConfig" [options]="commonChartOptions" [type]="'scatter'"></canvas>
        </div>
    </div>
    }

    @if (vendingConfig$ | async; as vendConfig) {
    <div class="track-box">
        <div class="track-header vending-header">
            <span class="circle-indicator">●</span> Operations (Vending)
        </div>
        <div class="canvas-container">
            <canvas baseChart [data]="vendConfig" [options]="commonChartOptions" [type]="'scatter'"></canvas>
        </div>
    </div>
    }
</div>
